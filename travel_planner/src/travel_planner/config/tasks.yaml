destination_selection_task:
  description: >
    Analyze the user preferences and select the best destination.

    User preferences:
    - Budget: {budget}
    - Travel period: {period}
    - Travel style: {style}
    - Duration: {duration}

    Choose the most suitable destination among the available ones.

  expected_output: >
    A detailed explanation of the selected destination.

  agent: travel_planner

flight_search_task:
  description: >
    Search for flights for the selected destination.

  expected_output: >
    Best flight options with prices and dates.

  agent: flight_agent

hotel_search_task:
  description: >
    Find hotels compatible with the user's budget and travel style.

  expected_output: >
    A list of recommended hotels.

  agent: hotel_agent

activity_search_task:
  description: >
    Suggest activities and attractions for the destination.

  expected_output: >
    A list of recommended activities.

  agent: activity_agent

final_plan_task:
  description: >
    Combine flights, hotels and activities into a complete travel plan.

  expected_output: >
    A complete organized travel plan.

  agent: travel_planner