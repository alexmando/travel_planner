destination_selection_task:
  description: >
    Analyze the user's preferences and select the best destination.

    Preferences:
    - Budget: {budget}
    - Travel period: {period}
    - Travel style: {style}
    - Duration: {duration}

    Choose the most suitable destination.

  expected_output: >
    Detailed explanation of the chosen destination.

  agent: travel_planner

flight_search_task:
  description: >
    Search for the best flights for the selected destination.

  expected_output: >
    Flight options with prices and dates.

  agent: flight_agent

hotel_search_task:
  description: >
    Search for hotels compatible with the user's budget and style.

  expected_output: >
    Recommended hotels.

  agent: hotel_agent

activity_search_task:
  description: >
    Suggest activities and attractions for the destination.

  expected_output: >
    Recommended activities.

  agent: activity_agent

final_plan_task:
  description: >
    Combine all information into a complete travel plan.

  expected_output: >
    Complete travel itinerary.

  agent: travel_planner